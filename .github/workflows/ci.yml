name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: dealtrust_test
          POSTGRES_USER: dealtrust
          POSTGRES_PASSWORD: dealtrust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dealtrust -d dealtrust_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:v1.27
        ports:
          - 1025:1025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification
        run: pnpm verify
        env:
          TEST_DATABASE_URL: postgres://dealtrust:dealtrust@localhost:5432/dealtrust_test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_SECURE: "false"
          MAIL_FROM: alerts@example.com
